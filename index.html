<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bitcoin Vault Dashboard</title>

    <meta name="description" content="Premium Bitcoin portfolio dashboard showing wallet balance and blockchain connection status.">

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="dashboard">


    <!-- Header -->

    <header class="header">


        <div class="logo-area">

            <div class="logo">
                ₿
            </div>


            <div>

                <h1>
                    Bitcoin Vault
                </h1>

                <p>
                    Digital Asset Management Dashboard
                </p>

            </div>

        </div>



        <div class="status">

            <span class="status-dot"></span>

            Blockchain Connected

        </div>


    </header>




    <!-- Dashboard Cards -->

    <main class="cards">



        <!-- Portfolio Card -->

        <section class="card">


            <p class="balance-title">
                Total Portfolio Balance
            </p>


            <div class="balance">
                0.00
            </div>


            <span class="currency">
                BTC
            </span>


        </section>





        <!-- Owner Card -->

        <section class="card owner">


            <p class="balance-title">
                Wallet Owner
            </p>


            <div class="owner-name">
                Dario Pietropaoli
            </div>


            <p>
                Premium Bitcoin Holder
            </p>


        </section>







        <!-- Wallet Card -->

        <section class="card">


            <p class="balance-title">
                Wallet Information
            </p>



            <div 
            id="walletAddress"
            class="wallet-address">

                bc1qexamplewalletaddress123456789

            </div>




            <div class="buttons">


                <button 
                id="copyWallet"
                class="btn btn-primary">

                    Copy Wallet

                </button>



                <button 
                class="btn btn-secondary">

                    Share

                </button>


            </div>



        </section>



    </main>



</div>






<!-- Floating Bitcoin -->

<div class="floating-bitcoin">

    ₿

</div>






<!-- Toast Notification -->

<div id="toast" class="toast">

    Wallet copied successfully

</div>






<script src="app.js"></script>


</body>

</html>
